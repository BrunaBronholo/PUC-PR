name: Discord PR Alerts

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened, closed]

jobs:
  discord-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord - PR aberto
        if: github.event.action == 'opened'
        run: |
          curl -H "Content-Type: application/json" -X POST -d '{
            "username": "GitHub Actions",
            "embeds": [{
              "title": "🔔 Novo Pull Request aberto",
              "description": "**#${{ github.event.pull_request.number }}** — ${{ github.event.pull_request.title }}",
              "color": 3447003,
              "url": "${{ github.event.pull_request.html_url }}",
              "fields": [
                {"name": "Autor", "value": "${{ github.event.pull_request.user.login }}", "inline": true},
                {"name": "Branch", "value": "`${{ github.head_ref }}` → `${{ github.base_ref }}`", "inline": true}
              ]
            }]
          }' "${{ secrets.DISCORD_WEBHOOK }}"

      - name: Notify Discord - PR atualizado
        if: github.event.action == 'synchronize'
        run: |
          curl -H "Content-Type: application/json" -X POST -d '{
            "username": "GitHub Actions",
            "embeds": [{
              "title": "🔄 Pull Request atualizado",
              "description": "**#${{ github.event.pull_request.number }}** — ${{ github.event.pull_request.title }}",
              "color": 16776960,
              "url": "${{ github.event.pull_request.html_url }}"
            }]
          }' "${{ secrets.DISCORD_WEBHOOK }}"

      - name: Notify Discord - PR mergeado
        if: github.event.action == 'closed' && github.event.pull_request.merged == true
        run: |
          curl -H "Content-Type: application/json" -X POST -d '{
            "username": "GitHub Actions",
            "embeds": [{
              "title": "✅ Pull Request mergeado",
              "description": "**#${{ github.event.pull_request.number }}** — ${{ github.event.pull_request.title }}",
              "color": 3066993,
              "url": "${{ github.event.pull_request.html_url }}"
            }]
          }' "${{ secrets.DISCORD_WEBHOOK }}"

      - name: Notify Discord - PR fechado sem merge
        if: github.event.action == 'closed' && github.event.pull_request.merged == false
        run: |
          curl -H "Content-Type: application/json" -X POST -d '{
            "username": "GitHub Actions",
            "embeds": [{
              "title": "❌ Pull Request fechado sem merge",
              "description": "**#${{ github.event.pull_request.number }}** — ${{ github.event.pull_request.title }}",
              "color": 15158332,
              "url": "${{ github.event.pull_request.html_url }}"
            }]
          }' "${{ secrets.DISCORD_WEBHOOK }}"
